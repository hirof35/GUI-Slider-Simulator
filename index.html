<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>🌊 ウォータースライダー・シミュレーター (本格構成版)</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { margin-bottom: 10px; font-size: 24px; text-shadow: 0 0 10px #00d2ff; }
        #info-panel {
            display: flex; gap: 20px; margin-bottom: 15px; font-size: 18px;
            background: rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 8px;
        }
        .stat span { font-weight: bold; color: #00d2ff; }
        canvas {
            background: linear-gradient(to bottom, #203a43, #0f2027);
            border: 4px solid #333; border-radius: 12px;
        }
        #effect-toast {
            position: absolute; top: 20%; font-size: 32px; font-weight: bold;
            text-shadow: 0 0 10px #fff; pointer-events: none; opacity: 0;
            transition: opacity 0.2s, transform 0.2s; transform: scale(0.5);
        }
        #effect-toast.show { opacity: 1; transform: scale(1.2); }
    </style>
</head>
<body>

    <h1>🌊 WATER SLIDER SIMULATOR</h1>
    
    <div id="info-panel">
        <div class="stat">距離: <span id="dist-val">0</span> m</div>
        <div class="stat">速度: <span id="speed-val">30.0</span> km/h</div>
        <div class="stat">状態: <span id="status-val">滑走中...</span></div>
    </div>

    <canvas id="stage" width="500" height="600"></canvas>
    <div id="effect-toast"></div>

    <script src="dist/slider.js"></script>
</body>
</html>
